@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; }
body, html { margin: 0; padding: 0; }

.pp-app {
  min-height: 100vh;
  background: #0f0f0e;
  color: #e8e3d8;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.005em;
  background-image:
    radial-gradient(at 20% 0%, rgba(200,169,106,0.04) 0%, transparent 50%),
    radial-gradient(at 80% 100%, rgba(106,140,170,0.03) 0%, transparent 50%);
  background-attachment: fixed;
}

.pp-header {
  border-bottom: 1px solid #2a2823;
  background: rgba(15,15,14,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.pp-header-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
}
.pp-brand { display: flex; align-items: center; gap: 14px; }
.pp-brand-mark {
  width: 38px; height: 38px;
  border: 1px solid #c8a96a;
  color: #c8a96a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600; font-size: 18px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.pp-brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 500;
  letter-spacing: 0.02em; color: #e8e3d8;
}
.pp-brand-sub {
  font-size: 11px; letter-spacing: 0.15em;
  color: #7a7368; text-transform: uppercase;
  margin-top: 2px;
}
.pp-nav { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.pp-nav button {
  background: transparent; border: none; color: #9a9388;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer;
  transition: color 0.2s; position: relative;
}
.pp-nav button:hover { color: #e8e3d8; }
.pp-nav button.on { color: #c8a96a; }
.pp-nav button.on::after {
  content: ''; position: absolute;
  bottom: -19px; left: 16px; right: 16px;
  height: 1px; background: #c8a96a;
}
.pp-nav button.ic {
  font-size: 14px; padding: 8px 10px;
  border: 1px solid #2a2823; color: #7a7368;
}
.pp-nav button.ic:hover { color: #c8a96a; border-color: #c8a96a; }
.pp-nav-sep { width: 1px; height: 18px; background: #2a2823; margin: 0 8px; }

.pp-main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 48px 32px 80px;
}

.pp-footer {
  max-width: 1240px;
  margin: 0 auto;
  padding: 32px;
  border-top: 1px solid #2a2823;
  display: flex; gap: 12px;
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: #5a554d;
  font-family: 'JetBrains Mono', monospace;
  flex-wrap: wrap;
}
.pp-dot { color: #3a3833; }

.dash { display: flex; flex-direction: column; gap: 32px; }
.hero { display: flex; flex-direction: column; gap: 24px; }
.hero-row {
  display: flex; align-items: flex-end;
  justify-content: space-between; gap: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid #2a2823;
  flex-wrap: wrap;
}

}
.balance-bar-fill {

/* === Privacy mode === */
.pp-app[data-privacy="1"] .hero-value,
.pp-app[data-privacy="1"] .hero-sub,
.pp-app[data-privacy="1"] .kpi-value,
.pp-app[data-privacy="1"] .bd-table td.num,
.pp-app[data-privacy="1"] .reb-now .val,
.pp-app[data-privacy="1"] .reb-target .val,
.pp-app[data-privacy="1"] .upd-total-value,
.pp-app[data-privacy="1"] .badge,
.pp-app[data-privacy="1"] .delta-value,
.pp-app[data-privacy="1"] .alloc-result-amount {
  filter: blur(8px);
  transition: filter 0.3s ease;
  user-select: none;
  cursor: pointer;
}
.pp-app[data-privacy="1"] .hero-value:hover,
.pp-app[data-privacy="1"] .kpi-value:hover {
  filter: blur(0);
}
.privacy-toggle.on {
  color: #c8a96a !important;
  border-color: #c8a96a !important;
}

/* === Animations === */
/* Page-level fade-in on view change */
.dash, .update, .settings, .history {
  animation: view-fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes view-fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* KPI cards stagger in */
.kpi {
  animation: kpi-rise 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}
.kpi-grid > .kpi:nth-child(1) { animation-delay: 0.05s; }
.kpi-grid > .kpi:nth-child(2) { animation-delay: 0.12s; }
.kpi-grid > .kpi:nth-child(3) { animation-delay: 0.19s; }
.kpi-grid > .kpi:nth-child(4) { animation-delay: 0.26s; }
@keyframes kpi-rise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Progress bar shimmer on the active fill */
.kpi-bar-fill {
  position: relative;
  overflow: hidden;
}
.kpi-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shimmer 2.6s infinite;
}
@keyframes shimmer {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}

/* Pulse for out-of-threshold rebalance badges */
.badge.add, .badge.reduce {
  position: relative;
}
.badge.add::before, .badge.reduce::before {
  content: '';
  position: absolute;
  inset: -1px;
  border: 1px solid;
  border-color: inherit;
  opacity: 0;
  animation: badge-pulse 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  pointer-events: none;
}
.badge.add::before { border-color: #6a8caa; }
.badge.reduce::before { border-color: #b8694e; }
@keyframes badge-pulse {
  0% { opacity: 0.7; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.15); }
}

/* Hover lift on cards */
.card {
  transition: border-color 0.3s ease, transform 0.3s ease;
}
.kpi {
  transition: background 0.3s ease;
}
.kpi:hover {
  background: #1a1812;
}

/* Hero CTA button - subtle gold sheen */
.hero-cta {
  position: relative;
  overflow: hidden;
}
.hero-cta::after {
  content: '';
  position: absolute;
  top: 0; left: -75%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: skewX(-20deg);
  transition: left 0.6s ease;
}
.hero-cta:hover::after {
  left: 125%;
}
.hero-cta .arrow {
  transition: transform 0.3s ease;
}
.hero-cta:hover .arrow {
  transform: translateX(4px);
}

/* Reduce motion if user prefers */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Table scroll wrapper */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -8px;
}
.table-scroll table { min-width: 100%; }

/* Sync pill in header */
.sync-pill {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  padding: 6px 12px !important;
  border: 1px solid #2a2823 !important;
  background: transparent !important;
  font-size: 11px !important;
  letter-spacing: 0.1em !important;
  color: #9a9388 !important;
  cursor: pointer;
  transition: all 0.2s;
}
.sync-pill:hover { border-color: #c8a96a !important; color: #e8e3d8 !important; }
.sync-pill .sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7a8b6f;
  flex-shrink: 0;
}
.sync-pill.sync-syncing .sync-dot {
  background: #c8a96a;
  animation: pulse 1.2s infinite;
}
.sync-pill.sync-err .sync-dot { background: #b8694e; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Sync section in settings */
.sync-status-syncing { color: #c8a96a !important; }
.sync-status-err { color: #b8694e !important; }
.sync-status-ok { color: #7a8b6f !important; }

.sync-steps {
  margin: 16px 0 20px 0;
  padding-left: 24px;
  color: #c4bfb3;
  line-height: 1.9;
  font-size: 13px;
}
.sync-steps li { margin-bottom: 4px; }
.sync-steps a {
  color: #c8a96a;
  text-decoration: none;
  border-bottom: 1px solid rgba(200,169,106,0.3);
}
.sync-steps a:hover { border-bottom-color: #c8a96a; }
.sync-steps strong { color: #e8e3d8; font-weight: 600; }
.sync-steps code, .sync-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: #0f0f0e;
  padding: 2px 6px;
  border: 1px solid #2a2823;
  color: #c8a96a;
}

.sync-input-row {
  display: block !important;
  padding: 0 0 16px 0 !important;
  border-bottom: none !important;
}
.sync-input-row .upd-input { font-size: 13px; font-family: 'JetBrains Mono', monospace; }

.sync-error {
  margin-top: 14px;
  padding: 12px 16px;
  background: rgba(184,105,78,0.08);
  border: 1px solid #5a3528;
  color: #f0c4b4;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  word-break: break-word;
  line-height: 1.5;
}

/* === Allocate view === */
.alloc-presets {
  display: flex;
  gap: 8px;
  padding: 16px 32px;
  border-top: 1px solid #1f1d18;
  flex-wrap: wrap;
}
.alloc-preset {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid #3a3833;
  color: #9a9388;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.alloc-preset:hover { border-color: #c8a96a; color: #c8a96a; }

  font-size: 18px;
  color: #e8e3d8;
}

  gap: 0;
  border: 1px solid #3a3833;

  background: rgba(200,169,106,0.1);
  color: #c8a96a;

.alloc-mode-tabs .m-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;

}

  letter-spacing: 0.05em;
  color: #7a7368;
}
.alloc-mode-tabs button.on .m-sub { color: #c8a96a; opacity: 0.8; }

.alloc-results {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

  flex-direction: column;

  padding-bottom: 18px;
  border-bottom: 1px solid #1f1d18;
}
.alloc-row:last-child { border-bottom: none; padding-bottom: 0; }

  justify-content: space-between;
  align-items: baseline;
  gap: 16px;
  flex-wrap: wrap;
}
.alloc-row-label { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.alloc-row-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: #e8e3d8;
}
.alloc-row-en {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #7a7368;
}
.alloc-result-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  color: #c8a96a;
  font-weight: 500;
}
.alloc-row-bar {
  height: 5px;
  background: #1a1813;
  overflow: hidden;
}
.alloc-row-bar-fill {
  height: 100%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.alloc-row-bot {
  display: flex;
  justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;

}

.alloc-projection {

.alloc-proj-head {
  font-family: 'JetBrains Mono', monospace;

  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #c8a96a;
  margin-bottom: 16px;
}
.alloc-proj-bars { display: flex; flex-direction: column; gap: 12px; }
.alloc-proj-row {
  display: grid;
  grid-template-columns: 80px 1fr 140px;
  gap: 14px;
  align-items: center;
}
.alloc-proj-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: #e8e3d8;
}
.alloc-proj-bar {
  position: relative;
  height: 14px;
  background: #1a1813;
}
.alloc-proj-bar-current {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  z-index: 1;
}
.alloc-proj-bar-new {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  z-index: 2;
  transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}
.alloc-proj-bar-target {
  position: absolute;
  top: -3px; bottom: -3px;
  width: 1.5px;
  background: #e8e3d8;
  z-index: 3;
}
.alloc-proj-pcts {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  justify-content: flex-end;
}
.alloc-proj-pcts .from { color: #7a7368; }
.alloc-proj-pcts .arr { color: #5a554d; }
.alloc-proj-pcts .to { color: #c8a96a; font-weight: 600; }
.alloc-proj-legend {
  display: flex;
  gap: 18px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #1f1d18;
  font-size: 11px;
  color: #7a7368;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.alloc-proj-legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend-swatch {
  display: inline-block;
  width: 12px;
  height: 8px;
}

@media (max-width: 760px) {
  .alloc-presets { padding: 14px 18px; }
  .alloc-mode-row { grid-template-columns: 1fr; gap: 12px; padding: 18px; }

  .alloc-proj-pcts { grid-column: 1 / -1; justify-content: flex-end; }
  .alloc-result-amount { font-size: 18px; }
  .alloc-row-name { font-size: 18px; }
}

/* Mobile update form fixes */
@media (max-width: 760px) {
  .update-form { margin: 0 -4px; }
  .upd-row { padding: 18px; gap: 14px; }
  .upd-label { font-size: 19px; }
  .upd-input { font-size: 16px; padding: 12px 14px; }

  .pp-footer {

    align-items: flex-start;
    gap: 4px;

  .pp-dot { display: none; }
  .charts-row { gap: 16px; }
  .chart-card { padding: 18px; }
  .legend { gap: 12px; }
  .legend-label { font-size: 13px; }
  .reb-list .reb-row:first-child { padding-top: 8px; }
}
