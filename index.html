@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

* { box-sizing: border-box; }
body, html {
  margin: 0;
  padding: 0;
  background: #0f0f0e;
  /* Prevent rubber-band white flash on iOS at top/bottom */
  overscroll-behavior-y: none;
}

.pp-app {
  min-height: 100vh;
  background: #0f0f0e;
  color: #e8e3d8;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.005em;
  background-image:
    radial-gradient(at 20% 0%, rgba(200,169,106,0.04) 0%, transparent 50%),
    radial-gradient(at 80% 100%, rgba(106,140,170,0.03) 0%, transparent 50%);
  background-attachment: fixed;
}

.pp-header {
  border-bottom: 1px solid #2a2823;
  background: rgba(15,15,14,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 50;
  /* Extend background up into iOS notch / safe area */
  padding-top: env(safe-area-inset-top);
}
.pp-header-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 32px;
  padding-left: max(32px, env(safe-area-inset-left));
  padding-right: max(32px, env(safe-area-inset-right));
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  position: relative;
}
.pp-brand { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.pp-brand-mark {
  width: 38px; height: 38px;
  border: 1px solid #c8a96a;
  color: #c8a96a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600; font-size: 18px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.pp-brand-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 500;
  letter-spacing: 0.02em; color: #e8e3d8;
}
.pp-brand-sub {
  font-size: 11px; letter-spacing: 0.15em;
  color: #7a7368; text-transform: uppercase;
  margin-top: 2px;
}
.pp-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  flex: 1;
  justify-content: flex-end;
  min-width: 0;
}
.pp-tabs {
  display: flex;
  gap: 0;
  align-items: center;
}
.pp-tools {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.pp-tools-inline {
  display: flex;
  align-items: center;
  gap: 4px;
}
.pp-nav button {
  background: transparent; border: none; color: #9a9388;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer;
  transition: color 0.2s; position: relative;
}
.pp-nav button:hover { color: #e8e3d8; }
.pp-tabs button.on { color: #c8a96a; }
.pp-tabs button.on::after {
  content: ''; position: absolute;
  bottom: -19px; left: 16px; right: 16px;
  height: 1px; background: #c8a96a;
}
.pp-nav button.ic {
  font-size: 14px; padding: 8px 10px;
  border: 1px solid #2a2823; color: #7a7368;
  line-height: 1;
}
.pp-nav button.ic:hover { color: #c8a96a; border-color: #c8a96a; }
.pp-menu-btn {
  font-size: 18px !important;
  padding: 6px 10px !important;
  display: none;
}
.pp-menu-btn.on { color: #c8a96a !important; border-color: #c8a96a !important; }

/* Dropdown menu */
.pp-menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 60;
  animation: menu-fade 0.2s ease-out;
}
.pp-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 16px;
  min-width: 240px;
  background: #15140e;
  border: 1px solid #3a3833;
  z-index: 61;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6);
  animation: menu-slide 0.22s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes menu-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes menu-slide {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}
.pp-menu-item {
  display: grid !important;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  width: 100%;
  padding: 14px 16px !important;
  background: transparent;
  border: none;
  border-bottom: 1px solid #1f1d18;
  color: #c4bfb3;
  cursor: pointer;
  text-align: left !important;
  font-family: 'Inter', sans-serif;
  text-transform: none !important;
  letter-spacing: 0 !important;
  transition: background 0.15s;
}
.pp-menu-item:last-child { border-bottom: none; }
.pp-menu-item:hover { background: rgba(200,169,106,0.08); color: #e8e3d8; }
.pp-menu-item.on { color: #c8a96a; }
.pp-menu-icon {
  font-size: 16px;
  color: #c8a96a;
  text-align: center;
}
.pp-menu-label {
  font-size: 13px;
  font-weight: 500;
}
.pp-menu-sub {
  font-size: 11px;
  color: #7a7368;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}
.pp-nav-sep { width: 1px; height: 18px; background: #2a2823; margin: 0 4px; }

.pp-main {
  max-width: 1240px;
  margin: 0 auto;
  padding: 48px 32px 80px;
  padding-left: max(32px, env(safe-area-inset-left));
  padding-right: max(32px, env(safe-area-inset-right));
}

.pp-footer {
  max-width: 1240px;
  margin: 0 auto;
  padding: 32px;
  border-top: 1px solid #2a2823;
  display: flex; gap: 12px;
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: #5a554d;
  font-family: 'JetBrains Mono', monospace;
  flex-wrap: wrap;
}
.pp-dot { color: #3a3833; }

.dash { display: flex; flex-direction: column; gap: 32px; }
.hero { display: flex; flex-direction: column; gap: 24px; }
.hero-row {
  display: flex; align-items: flex-end;
  justify-content: space-between; gap: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid #2a2823;
  flex-wrap: wrap;
}
.hero-block { display: flex; flex-direction: column; gap: 6px; }
.hero-label {
  font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase; color: #7a7368; font-weight: 500;
}
.hero-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 64px; font-weight: 400;
  letter-spacing: -0.01em; color: #e8e3d8; line-height: 1;
}
.hero-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; color: #7a7368; margin-top: 4px;
}
.hero-cta {
  background: #c8a96a; color: #0f0f0e;
  border: none; padding: 16px 28px;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
}
.hero-cta:hover { background: #d4b878; transform: translateY(-1px); }
.hero-cta .arrow { font-size: 16px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: #2a2823;
  border: 1px solid #2a2823;
}
.kpi {
  background: #15140e;
  padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: #c8a96a; opacity: 0.3;
}
.kpi.add::before { background: #4e7fb8; opacity: 0.8; }
.kpi.reduce::before { background: #b8694e; opacity: 0.8; }
.kpi.hold::before { background: #7a8b6f; opacity: 0.5; }
.kpi-top, .kpi-bot { display: flex; justify-content: space-between; align-items: baseline; }
.kpi-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 500; color: #e8e3d8;
}
.kpi-share {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #7a7368;
}
.kpi-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 500;
  color: #e8e3d8; letter-spacing: -0.01em;
  word-break: break-all;
}
.kpi-bar {
  position: relative; height: 4px;
  background: #2a2823; margin: 6px 0;
}
.kpi-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #c8a96a, #d4b878);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.kpi-bar-target {
  position: absolute;
  top: -3px; bottom: -3px;
  width: 1.5px; background: #e8e3d8;
}
.kpi-target, .kpi-dev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.05em;
}
.kpi-target { color: #5a554d; text-transform: uppercase; }
.kpi-dev.pos { color: #b8694e; }
.kpi-dev.neg { color: #6a8caa; }

@media (max-width: 880px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .hero-value { font-size: 44px; }
  .pp-main { padding: 28px 16px 60px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
  .pp-header-inner { padding: 14px 16px; gap: 12px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }
  .pp-nav { gap: 8px; }
  .pp-tabs { flex-wrap: wrap; row-gap: 4px; }
  .pp-tabs button { padding: 8px 10px; font-size: 11px; letter-spacing: 0.08em; }
  .pp-tabs button.on::after { bottom: 2px; left: 10px; right: 10px; height: 1px; }
  /* Hide inline tools on mobile, use the menu button instead */
  .pp-tools-inline { display: none; }
  .pp-menu-btn { display: inline-flex !important; align-items: center; justify-content: center; }
  /* Compact sync pill: hide text, keep dot */
  .sync-pill .sync-text { display: none; }
  .sync-pill { padding: 8px !important; min-width: 28px; justify-content: center; }
  .pp-nav-sep { display: none; }
  .hero-cta { padding: 12px 18px; font-size: 11px; }
  .pp-brand-mark { width: 32px; height: 32px; font-size: 14px; }
  .pp-brand-title { font-size: 17px; }
  .pp-brand-sub { font-size: 10px; letter-spacing: 0.1em; }
}

@media (max-width: 540px) {
  .pp-main { padding: 20px 12px 60px; padding-left: max(12px, env(safe-area-inset-left)); padding-right: max(12px, env(safe-area-inset-right)); }
  .pp-header-inner { padding: 12px 14px; padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
  .pp-brand { gap: 10px; }
  .pp-brand-mark { width: 28px; height: 28px; font-size: 13px; }
  /* Hide subtitle on tightest screens, brand title alone is enough */
  .pp-brand-sub { display: none; }
  .pp-brand-title { font-size: 16px; }
  .hero-row {
    flex-direction: column;
    align-items: stretch;
    gap: 18px;
    padding-bottom: 18px;
  }
  .hero-value { font-size: 38px; }
  .hero-label { font-size: 10px; }
  .hero-cta { width: 100%; justify-content: center; padding: 14px; }
  .kpi-grid { grid-template-columns: 1fr; }
  .kpi { padding: 18px; }
  .kpi-label { font-size: 16px; }
  .kpi-value { font-size: 20px; }
  .dash { gap: 22px; }
  .pp-footer { padding: 24px 14px; font-size: 10px; gap: 8px; padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  .pp-menu { right: 8px; left: 8px; min-width: 0; }
}

/* Apply safe-area to footer always */
.pp-footer { padding-bottom: max(32px, env(safe-area-inset-bottom)); padding-left: max(32px, env(safe-area-inset-left)); padding-right: max(32px, env(safe-area-inset-right)); }

.card {
  background: #15140e;
  border: 1px solid #2a2823;
  padding: 32px;
}
.card-head {
  display: flex; align-items: baseline;
  justify-content: space-between;
  margin-bottom: 24px; padding-bottom: 16px;
  border-bottom: 1px solid #2a2823;
  gap: 12px; flex-wrap: wrap;
}
.card-head h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 500;
  letter-spacing: 0.01em; color: #e8e3d8; margin: 0;
}
.card-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: #7a7368;
}
.card-sub.warn { color: #b8694e; }

.reb-list { display: flex; flex-direction: column; }
.reb-row {
  display: grid;
  grid-template-columns: 1.4fr 2.6fr 1.4fr;
  gap: 24px;
  padding: 20px 0;
  border-bottom: 1px solid #1f1d18;
  align-items: center;
}
.reb-row:last-child { border-bottom: none; }
.reb-cat {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 500; color: #e8e3d8;
}
.reb-en {
  font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; color: #7a7368; margin-top: 2px;
}
.reb-numbers { display: flex; align-items: center; gap: 16px; }
.reb-now, .reb-target { display: flex; flex-direction: column; gap: 2px; }
.reb-now .lbl, .reb-target .lbl {
  font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; color: #5a554d;
}
.reb-now .val, .reb-target .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; color: #e8e3d8;
}
.reb-now .pct, .reb-target .pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #7a7368;
}
.reb-arrow {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; color: #5a554d;
}
.reb-action { text-align: right; }
.badge {
  display: inline-block; padding: 8px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.05em;
  border: 1px solid;
  white-space: nowrap;
}
.badge.hold { color: #7a8b6f; border-color: #3a4738; background: rgba(122,139,111,0.08); }
.badge.add { color: #6a8caa; border-color: #2d3e52; background: rgba(106,140,170,0.1); }
.badge.reduce { color: #b8694e; border-color: #5a3528; background: rgba(184,105,78,0.1); }

@media (max-width: 760px) {
  .reb-row { grid-template-columns: 1fr; gap: 10px; padding: 16px 0; }
  .reb-action { text-align: left; }
  .reb-cat { font-size: 19px; }
  .reb-numbers { gap: 10px; }
  .reb-now .val, .reb-target .val { font-size: 14px; }
  .card { padding: 18px; }
}

@media (max-width: 540px) {
  .reb-numbers {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
  .reb-arrow { display: none; }
  .reb-now, .reb-target {

.legend {

.bd-table {

.update, .settings, .history { display: flex; flex-direction: column; gap: 32px; }
.update-head h1 {

}
.upd-row {

}

.upd-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; color: #e8e3d8; display: inline;
}
.upd-en {
  font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; color: #7a7368; margin-top: 2px;
}
.upd-hint {
  font-size: 12px; color: #7a7368;

}
.upd-input-wrap {

}

.upd-cur {

}
.upd-cur-label {
  padding: 0 14px; color: #7a7368;

  font-size: 11px; letter-spacing: 0.1em;

}
.upd-input {
  flex: 1; background: transparent; border: none; outline: none;

  font-size: 18px; padding: 14px 16px;

}
.upd-input::-webkit-outer-spin-button,
.upd-input::-webkit-inner-spin-button {

}
.upd-input[type=number] { -moz-appearance: textfield; }

.upd-total {

}
.upd-total-label {

.update-actions {

}
.btn-primary, .btn-ghost {

}
.btn-primary { background: #c8a96a; color: #0f0f0e; border-color: #c8a96a; }
.btn-primary:hover:not(:disabled) { background: #d4b878; border-color: #d4b878; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

@media (max-width: 760px) {

}

.set-row {
  display: grid;
  grid-template-columns: 1fr 200px;

.set-label {

}

@media (max-width: 760px) {

.sync-card .sync-text {
  color: #c4bfb3; line-height: 1.7; font-size: 14px;
  margin: 0 0 20px 0;
}
.sync-card .sync-text strong { color: #c8a96a; font-weight: 600; }
.sync-actions { display: flex; gap: 12px; flex-wrap: wrap; }

.tt {
  background: #1a1813;
  border: 1px solid #3a3833;
  padding: 12px 16px;
  font-size: 12px;
}
.tt-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; color: #e8e3d8; margin-bottom: 4px;
}
.tt-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; color: #c8a96a; font-weight: 500;
}
.tt-sub { font-size: 11px; color: #7a7368; margin-top: 2px; }
.tt-row {
  display: flex; justify-content: space-between; gap: 16px; margin-top: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.tt-key { font-weight: 500; }
.tt-val { color: #e8e3d8; }

.toast {
  position: fixed;
  bottom: 32px; left: 50%;
  transform: translateX(-50%);
  background: #15140e;
  border: 1px solid #c8a96a;
  color: #e8e3d8;
  padding: 14px 24px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.05em;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 100;
  animation: toast-in 0.25s ease-out;
  max-width: calc(100vw - 32px);
  text-align: center;
}
.toast-err { border-color: #b8694e; color: #f0c4b4; }
@keyframes toast-in {
  from { opacity: 0; transform: translate(-50%, 12px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* === MoM delta in hero === */
.hero-sub-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.hero-delta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid;
  animation: delta-pop 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
  animation-delay: 0.3s;
}
.hero-delta.pos { color: #7a8b6f; border-color: rgba(122,139,111,0.4); background: rgba(122,139,111,0.06); }
.hero-delta.neg { color: #b8694e; border-color: rgba(184,105,78,0.4); background: rgba(184,105,78,0.06); }
.hero-delta .delta-arrow { font-size: 9px; }
.hero-delta .delta-value { font-weight: 600; }
.hero-delta .delta-pct { opacity: 0.8; }
.hero-delta .delta-since { opacity: 0.5; font-size: 10px; margin-left: 4px; }
@keyframes delta-pop {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}

/* === Balance Score Bar === */
.balance-bar-wrap {
  margin-top: 4px;
  padding: 18px 24px;
  background: linear-gradient(135deg, rgba(200,169,106,0.05), rgba(106,140,170,0.04));
  border: 1px solid #2a2823;
  display: flex;
  flex-direction: column;
  gap: 8px;
  animation: view-fade-in 0.6s 0.15s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}
.balance-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.bal-name {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #7a7368;
  font-weight: 500;
}
.bal-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: #c8a96a;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.bal-num-unit {
  font-size: 14px;
  color: #5a554d;
  margin-left: 2px;
}
.balance-bar-track {
  position: relative;
  height: 6px;
  background: #1a1813;
  overflow: hidden;
}
.balance-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #b8694e 0%, #c8a96a 50%, #7a8b6f 100%);
  background-size: 200% 100%;
  background-position: 100% 0;
  transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.balance-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  animation: shimmer 3s infinite;
}
.balance-bar-hint {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: #9a9388;
  margin-top: 2px;
}

/* === Privacy mode === */
.pp-app[data-privacy="1"] .hero-value,
.pp-app[data-privacy="1"] .hero-sub,
.pp-app[data-privacy="1"] .kpi-value,
.pp-app[data-privacy="1"] .bd-table td.num,
.pp-app[data-privacy="1"] .reb-now .val,
.pp-app[data-privacy="1"] .reb-target .val,
.pp-app[data-privacy="1"] .upd-total-value,
.pp-app[data-privacy="1"] .badge,
.pp-app[data-privacy="1"] .delta-value,
.pp-app[data-privacy="1"] .alloc-result-amount {
  filter: blur(8px);
  transition: filter 0.3s ease;
  user-select: none;
  cursor: pointer;
}
.pp-app[data-privacy="1"] .hero-value:hover,
.pp-app[data-privacy="1"] .kpi-value:hover {
  filter: blur(0);
}
.privacy-toggle.on {
  color: #c8a96a !important;
  border-color: #c8a96a !important;
}

/* === Animations === */
/* Page-level fade-in on view change */
.dash, .update, .settings, .history {
  animation: view-fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes view-fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* KPI cards stagger in */
.kpi {
  animation: kpi-rise 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
}
.kpi-grid > .kpi:nth-child(1) { animation-delay: 0.05s; }
.kpi-grid > .kpi:nth-child(2) { animation-delay: 0.12s; }
.kpi-grid > .kpi:nth-child(3) { animation-delay: 0.19s; }
.kpi-grid > .kpi:nth-child(4) { animation-delay: 0.26s; }
@keyframes kpi-rise {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Progress bar shimmer on the active fill */
.kpi-bar-fill {
  position: relative;
  overflow: hidden;
}
.kpi-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shimmer 2.6s infinite;
}
@keyframes shimmer {
  0% { left: -100%; }
  60%, 100% { left: 100%; }
}

/* Pulse for out-of-threshold rebalance badges */
.badge.add, .badge.reduce {
  position: relative;
}
.badge.add::before, .badge.reduce::before {
  content: '';
  position: absolute;
  inset: -1px;
  border: 1px solid;
  border-color: inherit;
  opacity: 0;
  animation: badge-pulse 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  pointer-events: none;
}
.badge.add::before { border-color: #6a8caa; }
.badge.reduce::before { border-color: #b8694e; }
@keyframes badge-pulse {
  0% { opacity: 0.7; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.15); }
}

/* Hover lift on cards */
.card {
  transition: border-color 0.3s ease, transform 0.3s ease;
}
.kpi {
  transition: background 0.3s ease;
}
.kpi:hover {
  background: #1a1812;
}

/* Hero CTA button - subtle gold sheen */
.hero-cta {
  position: relative;
  overflow: hidden;
}
.hero-cta::after {
  content: '';
  position: absolute;
  top: 0; left: -75%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  transform: skewX(-20deg);
  transition: left 0.6s ease;
}
.hero-cta:hover::after {
  left: 125%;
}
.hero-cta .arrow {
  transition: transform 0.3s ease;
}
.hero-cta:hover .arrow {
  transform: translateX(4px);
}

/* Reduce motion if user prefers */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Table scroll wrapper */
.table-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -8px;
}
.table-scroll table { min-width: 100%; }

/* Sync pill in header */
.sync-pill {
  display: inline-flex !important;
  align-items: center;
  gap: 6px;
  padding: 6px 12px !important;
  border: 1px solid #2a2823 !important;

/* Sync section in settings */

.sync-status-err { color: #b8694e !important; }

.alloc-row-bot .alloc-effect { color: #9a9388; }

.alloc-projection {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid #2a2823;
}
.alloc-proj-head {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #c8a96a;
  margin-bottom: 16px;
}
.alloc-proj-bars { display: flex; flex-direction: column; gap: 12px; }
.alloc-proj-row {
  display: grid;
  grid-template-columns: 80px 1fr 140px;
  gap: 14px;
  align-items: center;
}
.alloc-proj-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: #e8e3d8;
}
.alloc-proj-bar {
  position: relative;
  height: 14px;
  background: #1a1813;
}
.alloc-proj-bar-current {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  z-index: 1;
}
.alloc-proj-bar-new {
  position: absolute;
  top: 0; left: 0; bottom: 0;
  z-index: 2;
  transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
}
.alloc-proj-bar-target {
  position: absolute;
  top: -3px; bottom: -3px;
  width: 1.5px;
  background: #e8e3d8;
  z-index: 3;
}
.alloc-proj-pcts {
  display: flex;
  align-items: baseline;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  justify-content: flex-end;
}
.alloc-proj-pcts .from { color: #7a7368; }
.alloc-proj-pcts .arr { color: #5a554d; }
.alloc-proj-pcts .to { color: #c8a96a; font-weight: 600; }
.alloc-proj-legend {
  display: flex;
  gap: 18px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #1f1d18;
  font-size: 11px;
  color: #7a7368;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
}
.alloc-proj-legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend-swatch {
  display: inline-block;
  width: 12px;
  height: 8px;
}

@media (max-width: 760px) {
  .alloc-presets { padding: 14px 18px; }
  .alloc-mode-row { grid-template-columns: 1fr; gap: 12px; padding: 18px; }
  .alloc-proj-row { grid-template-columns: 60px 1fr; }
  .alloc-proj-pcts { grid-column: 1 / -1; justify-content: flex-end; }
  .alloc-result-amount { font-size: 18px; }
  .alloc-row-name { font-size: 18px; }
}

/* Mobile update form fixes */
@media (max-width: 760px) {
  .update-form { margin: 0 -4px; }
  .upd-row { padding: 18px; gap: 14px; }
  .upd-label { font-size: 19px; }
  .upd-input { font-size: 16px; padding: 12px 14px; }
  .upd-cur, .upd-cur-label { padding: 0 10px; font-size: 13px; }
  .upd-total { padding: 18px; flex-direction: column; align-items: flex-start; gap: 8px; }
  .upd-total-value { font-size: 26px; }
  .update-actions { flex-direction: column-reverse; }
  .update-actions button { width: 100%; }
}

/* Improve readability on small mobile */
@media (max-width: 540px) {
  .pp-footer {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .pp-dot { display: none; }
  .charts-row { gap: 16px; }
  .chart-card { padding: 18px; }
  .legend { gap: 12px; }
  .legend-label { font-size: 13px; }
  .reb-list .reb-row:first-child { padding-top: 8px; }
}
